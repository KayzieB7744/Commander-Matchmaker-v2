<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commander Matchmaker Clean v2</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    :root {
      --bg: #0b0f16;
      --card: #141b25;
      --card-2: #0f1620;
      --border: #273244;
      --text: #f4f7fb;
      --muted: #b7c0cb;
      --blue: #2f6df6;
      --blue-2: #1f5ae0;
      --pill: #212c3a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 28px 20px 36px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2.4rem, 4vw, 4rem);
      line-height: 0.98;
      letter-spacing: -0.03em;
    }

    h2 {
      margin: 0 0 18px;
      font-size: 2rem;
      letter-spacing: -0.02em;
    }

    .subtle {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: clamp(1.1rem, 2vw, 1.35rem);
      line-height: 1.35;
      max-width: 860px;
    }

    .error {
      display: none;
      margin: 16px 0 20px;
      padding: 14px 16px;
      border-radius: 14px;
      background: #4b1f1f;
      color: #ffdada;
      border: 1px solid #6c2d2d;
    }

    .tabs-shell {
      margin: 18px 0 24px;
      display: inline-flex;
      gap: 10px;
      padding: 10px;
      background: #111823;
      border: 1px solid var(--border);
      border-radius: 999px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
    }

    .tab-button {
      appearance: none;
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      border-radius: 999px;
      padding: 14px 22px;
      min-width: 190px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .tab-button:hover {
      background: #1a2330;
      color: var(--text);
    }

    .tab-button.active {
      background: var(--blue);
      color: white;
      border-color: var(--blue-2);
      box-shadow: 0 8px 20px rgba(47, 109, 246, 0.28);
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    .card {
      background: linear-gradient(180deg, #141b25 0%, #121923 100%);
      border: 1px solid var(--border);
      border-radius: 26px;
      padding: 20px;
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.22);
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .control {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    label {
      color: var(--muted);
      font-size: 0.98rem;
    }

    input,
    select,
    button {
      font: inherit;
    }

    input,
    select {
      width: 100%;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: #09111b;
      color: var(--text);
      padding: 15px 16px;
      min-height: 56px;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(47, 109, 246, 0.18);
    }

    .button-row {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .action-btn {
      appearance: none;
      border: none;
      border-radius: 14px;
      padding: 12px 18px;
      min-height: 48px;
      cursor: pointer;
      font-weight: 600;
      color: white;
      background: var(--blue);
    }

    .action-btn:hover {
      background: var(--blue-2);
    }

    .action-btn.secondary {
      background: #2a3341;
      color: #f1f5f9;
    }

    .action-btn.secondary:hover {
      background: #374253;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 18px;
    }

    .stat {
      background: #0d141e;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
    }

    .stat-label {
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 6px;
    }

    .stat-value {
      font-weight: 700;
      font-size: 1.05rem;
    }

    .result-list {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .result-item {
      background: #0d141e;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
      min-height: 92px;
    }

    .result-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .result-meta {
      color: var(--muted);
      font-size: 0.93rem;
      line-height: 1.35;
      margin-bottom: 8px;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--pill);
      border: 1px solid #2d394a;
      border-radius: 999px;
      padding: 5px 10px;
      color: #d8e0ea;
      font-size: 0.82rem;
      line-height: 1;
    }

    .hidden-counter {
      display: none;
    }

    @media (max-width: 820px) {
      .wrap {
        padding: 24px 16px 32px;
      }

      .tabs-shell {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr 1fr;
        border-radius: 24px;
      }

      .tab-button {
        min-width: 0;
        width: 100%;
      }

      .controls,
      .stats {
        grid-template-columns: 1fr;
      }

      .card {
        border-radius: 22px;
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Commander Matchmaker Clean v2</h1>
    <p class="subtle">
      Balanced Commander pods and fair 1v1 matchups using Power, Game Speed, and Threat Perception.
    </p>

    <div id="app-error" class="error"></div>

    <div class="tabs-shell">
      <button class="tab-button active" data-tab="pod-panel" type="button">Pod Builder</button>
      <button class="tab-button" data-tab="duel-panel" type="button">1v1 Generator</button>
    </div>

    <section id="pod-panel" class="tab-panel active">
      <div class="card">
        <h2>Pod Builder</h2>

        <div class="controls">
          <div class="control">
            <label for="pod-bracket">Bracket</label>
            <select id="pod-bracket">
              <option value="2">2</option>
              <option value="3" selected>3</option>
              <option value="4">4</option>
              <option value="5">5</option>
            </select>
          </div>

          <div class="control">
            <label for="pod-size">Pod Size</label>
            <select id="pod-size">
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4" selected>4</option>
            </select>
          </div>

          <div class="control">
            <label for="pod-min-power">Min Power</label>
            <input id="pod-min-power" type="number" step="0.1" value="6" />
          </div>

          <div class="control">
            <label for="pod-max-power">Max Power</label>
            <input id="pod-max-power" type="number" step="0.1" value="7" />
          </div>

          <div class="control">
            <label for="pod-avoid-fast">Avoid Fast</label>
            <select id="pod-avoid-fast">
              <option value="no" selected>no</option>
              <option value="yes">yes</option>
            </select>
          </div>

          <div class="control">
            <label for="pod-deck-type">Deck Type</label>
            <select id="pod-deck-type">
              <option value="any" selected>any</option>
              <option value="Precon">Precon</option>
              <option value="Homebrew">Homebrew</option>
              <option value="Upgraded Precon">Upgraded Precon</option>
            </select>
          </div>

          <div class="control">
            <label for="pod-threat-filter">Threat Filter</label>
            <select id="pod-threat-filter">
              <option value="any" selected>any</option>
              <option value="exclude very high">exclude very high</option>
              <option value="low-medium only">low-medium only</option>
            </select>
          </div>

          <div class="control">
            <label for="pod-max-high-threat">Max High Threat</label>
            <select id="pod-max-high-threat">
              <option value="0">0</option>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4" selected>4</option>
            </select>
          </div>
        </div>

        <input id="pod-reroll-count" class="hidden-counter" type="number" step="1" value="0" />

        <div class="button-row">
          <button id="pod-generate" class="action-btn" type="button">Generate Pod</button>
          <button id="pod-reroll" class="action-btn secondary" type="button">Reroll</button>
        </div>

        <div class="stats">
          <div class="stat">
            <div class="stat-label">Eligible deck count</div>
            <div id="pod-eligible-count" class="stat-value">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">Pool</div>
            <div id="pod-pool" class="stat-value">—</div>
          </div>
        </div>

        <div class="result-list">
          <div class="result-item">
            <div id="pod-pick-1" class="result-title"></div>
            <div id="pod-pick-1-meta" class="result-meta"></div>
            <div class="pill-row">
              <span class="pill">Threat: <span id="pod-pick-1-threat"></span></span>
            </div>
          </div>

          <div class="result-item">
            <div id="pod-pick-2" class="result-title"></div>
            <div id="pod-pick-2-meta" class="result-meta"></div>
            <div class="pill-row">
              <span class="pill">Threat: <span id="pod-pick-2-threat"></span></span>
            </div>
          </div>

          <div class="result-item">
            <div id="pod-pick-3" class="result-title"></div>
            <div id="pod-pick-3-meta" class="result-meta"></div>
            <div class="pill-row">
              <span class="pill">Threat: <span id="pod-pick-3-threat"></span></span>
            </div>
          </div>

          <div class="result-item">
            <div id="pod-pick-4" class="result-title"></div>
            <div id="pod-pick-4-meta" class="result-meta"></div>
            <div class="pill-row">
              <span class="pill">Threat: <span id="pod-pick-4-threat"></span></span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section id="duel-panel" class="tab-panel">
      <div class="card">
        <h2>1v1 Generator</h2>

        <div class="controls">
          <div class="control">
            <label for="duel-bracket">Bracket</label>
            <select id="duel-bracket">
              <option value="2">2</option>
              <option value="3" selected>3</option>
              <option value="4">4</option>
              <option value="5">5</option>
            </select>
          </div>

          <div class="control">
            <label for="duel-min-power">Min Power</label>
            <input id="duel-min-power" type="number" step="0.1" value="6" />
          </div>

          <div class="control">
            <label for="duel-max-power">Max Power</label>
            <input id="duel-max-power" type="number" step="0.1" value="7" />
          </div>

          <div class="control">
            <label for="duel-avoid-fast">Avoid Fast</label>
            <select id="duel-avoid-fast">
              <option value="no" selected>no</option>
              <option value="yes">yes</option>
            </select>
          </div>

          <div class="control">
            <label for="duel-deck-type">Deck Type</label>
            <select id="duel-deck-type">
              <option value="any" selected>any</option>
              <option value="Precon">Precon</option>
              <option value="Homebrew">Homebrew</option>
              <option value="Upgraded Precon">Upgraded Precon</option>
            </select>
          </div>

          <div class="control">
            <label for="duel-threat-filter">Threat Filter</label>
            <select id="duel-threat-filter">
              <option value="any" selected>any</option>
              <option value="exclude very high">exclude very high</option>
              <option value="low-medium only">low-medium only</option>
            </select>
          </div>

          <div class="control">
            <label for="duel-avoid-threat-mismatch">Avoid Threat Mismatch</label>
            <select id="duel-avoid-threat-mismatch">
              <option value="no" selected>no</option>
              <option value="yes">yes</option>
            </select>
          </div>
        </div>

        <input id="duel-reroll-count" class="hidden-counter" type="number" step="1" value="0" />

        <div class="button-row">
          <button id="duel-generate" class="action-btn" type="button">Generate 1v1</button>
          <button id="duel-reroll" class="action-btn secondary" type="button">Reroll</button>
        </div>

        <div class="stats">
          <div class="stat">
            <div class="stat-label">Eligible deck count</div>
            <div id="duel-eligible-count" class="stat-value">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">Pool</div>
            <div id="duel-pool" class="stat-value">—</div>
          </div>
        </div>

        <div class="result-list">
          <div class="result-item">
            <div id="duel-pick-1" class="result-title"></div>
            <div id="duel-pick-1-meta" class="result-meta"></div>
            <div class="pill-row">
              <span class="pill">Threat: <span id="duel-pick-1-threat"></span></span>
            </div>
          </div>

          <div class="result-item">
            <div id="duel-pick-2" class="result-title"></div>
            <div id="duel-pick-2-meta" class="result-meta"></div>
            <div class="pill-row">
              <span class="pill">Threat: <span id="duel-pick-2-threat"></span></span>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const tabButtons = document.querySelectorAll(".tab-button");
      const tabPanels = document.querySelectorAll(".tab-panel");

      tabButtons.forEach((button) => {
        button.addEventListener("click", () => {
          const target = button.getAttribute("data-tab");

          tabButtons.forEach((btn) => btn.classList.remove("active"));
          tabPanels.forEach((panel) => panel.classList.remove("active"));

          button.classList.add("active");
          document.getElementById(target).classList.add("active");
        });
      });
    });
  </script>

  <script src="app.js"></script>
</body>
</html>
